<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Single dark background -->
  <rect width="200" height="200" rx="40" fill="#0F172A"/>
  
  <!-- Subtle circuit line -->
  <path d="M30 100 Q60 65 95 100 Q130 135 165 100" stroke="#1E40AF" stroke-width="8" stroke-opacity="0.6"/>
  
  <!-- Perfectly centered H -->
  <text 
    x="100" 
    y="115" 
    font-family="Arial Black, sans-serif" 
    font-size="155" 
    font-weight="900" 
    fill="#F1F5F9" 
    stroke="#3B82F6" 
    stroke-width="14" 
    paint-order="stroke fill"
    text-anchor="middle" 
    dominant-baseline="middle" 
    alignment-baseline="middle">
    H
  </text>
  
  <!-- Accent points -->
  <circle cx="45" cy="72" r="6" fill="#60A5FA"/>
  <circle cx="155" cy="128" r="6" fill="#60A5FA"/>
</svg>