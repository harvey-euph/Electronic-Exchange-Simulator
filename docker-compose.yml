version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: exchange-backend
    # SYS_NICE is required to set real-time scheduling priority (chrt) and CPU nice values
    cap_add:
      - SYS_NICE
    # Provide sufficient shared memory space for low-latency ring buffers
    shm_size: '512mb'
    ports:
      - "9001:9001" # Client Manager WebSocket
      - "9002:9002" # Market Data Server WebSocket
      - "8080:8080" # HTTP Accepter API
      - "8081:8081" # Public Data API
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: exchange-nginx
    ports:
      - "80:80"     # Web UI & Proxy Port
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
