server {
    listen 80;
    server_name __DOMAIN_NAME__;

    # Let's Encrypt 驗證路徑 (展期用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其餘所有請求強制轉向 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name __DOMAIN_NAME__;

    ssl_certificate /etc/letsencrypt/live/__DOMAIN_NAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN_NAME__/privkey.pem;

    root __FRONTEND_DIST_PATH__;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 代理 Management WebSocket (Port 9001)
    location /ws-mgmt {
        proxy_pass http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 代理 Market Data WebSocket (Port 9002)
    location /marketdata {
        proxy_pass http://127.0.0.1:9002/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 代理 API 請求 (Port 8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 代理 Public Data API 請求 (Port 8081)
    location /v1/symbol/ {
        proxy_pass http://127.0.0.1:8081/v1/symbol/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
