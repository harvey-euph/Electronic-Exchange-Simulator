name: OrderBook CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Build & Test (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Builder Image
        run: docker build --target builder -t exchange-builder .

      - name: Compile and Run Tests inside Docker
        run: |
          docker run --rm exchange-builder bash -c "make -j2 \$(ls tests/*.cpp | sed 's|tests/\(.*\)\.cpp|build/tests/\1|') && for test_bin in build/tests/*; do if [ -f \"\$test_bin\" ] && [ -x \"\$test_bin\" ]; then echo \"Running \$test_bin\"; \"\$test_bin\" || exit 1; fi; done"

  deploy:
    name: Deploy to GCP VM
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m

          script: |
            cd /home/${{ secrets.GCP_VM_USER }}/exchange
            git fetch origin main
            git reset --hard origin/main
            
            # 0. Ensure host dependencies (Docker, eBPF compiler tools) are installed
            ./scripts/install-requirements
            
            # 1. Update and restart Exchange using Docker Compose
            # (If compilation fails inside Docker, the old container is kept running. If it succeeds, it replaces the old one smoothly.)
            sudo docker compose up --build -d
            
            # 2. Wait for health check to pass (up to 60 seconds)
            echo "Waiting for exchange container to become healthy..."
            for i in {1..30}; do
              STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' exchange 2>/dev/null || echo "missing")
              if [ "$STATUS" == "healthy" ]; then
                echo "Deployment successful: container is healthy!"
                break
              elif [ "$STATUS" == "unhealthy" ]; then
                echo "Deployment failed: container is unhealthy!"
                sudo docker compose logs --tail 100
                exit 1
              fi
              echo "Status: $STATUS... waiting 2s"
              sleep 2
            done
            
            if [ "$STATUS" != "healthy" ]; then
                echo "Deployment timed out waiting for health check."
                sudo docker compose logs --tail 100
                exit 1
            fi
            
            # 3. Restart Market Makers inside the new container
            sudo docker exec exchange ./run-mm-native
            
            # 4. Build and restart eBPF tracing tools natively on host 
            # (eBPF cannot be compiled inside Docker because it needs host kernel headers)
            make -C performance/ebpf total-lat
            sudo pkill -x "total-lat" || true
            sudo nohup ./performance/ebpf/total-lat > log/latency.log 2>&1 &