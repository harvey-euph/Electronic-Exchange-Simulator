name: Benchmark

on:
  push:
    branches-ignore:
      - 'main'

jobs:
  benchmark:
    name: Run Benchmark on VM
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Run Benchmark
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 12h
          script: |
            cd /home/${{ secrets.GCP_VM_USER }}/exchange
            git fetch origin "${{ github.ref_name }}"
            git checkout -B "${{ github.ref_name }}" FETCH_HEAD
            git reset --hard FETCH_HEAD
            git clean -fd
            ./scripts/run-vm-benchmark.sh "${{ github.ref_name }}"